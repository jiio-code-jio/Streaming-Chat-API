<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StreamChat — AI Engineer Project 01</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #0e0e0e;
      --bg-panel:  #161616;
      --bg-msg:    #1c1c1c;
      --bg-user:   #1a2535;
      --border:    #2a2a2a;
      --border-hi: #3a3a3a;
      --text:      #e8e4dc;
      --text-dim:  #6b6861;
      --text-mid:  #a09d97;
      --cyan:      #4af0c4;
      --cyan-dim:  rgba(74, 240, 196, 0.12);
      --cyan-glow: rgba(74, 240, 196, 0.25);
      --red:       #ff5f57;
      --yellow:    #febc2e;
      --green:     #28c840;
      --mono:      'IBM Plex Mono', monospace;
      --sans:      'DM Sans', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Top bar ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 48px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-panel);
      flex-shrink: 0;
      user-select: none;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .traffic-lights {
      display: flex;
      gap: 6px;
    }

    .tl {
      width: 12px; height: 12px;
      border-radius: 50%;
    }
    .tl-red    { background: var(--red); }
    .tl-yellow { background: var(--yellow); }
    .tl-green  { background: var(--green); }

    .topbar-title {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 500;
      color: var(--text-mid);
      letter-spacing: 0.02em;
    }

    .topbar-title span { color: var(--cyan); }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: pulse 2.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    .status-label {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
    }

    .btn-reset {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 4px 10px;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.03em;
    }

    .btn-reset:hover {
      border-color: var(--red);
      color: var(--red);
    }

    /* ── Model badge ── */
    .model-badge {
      font-family: var(--mono);
      font-size: 10px;
      background: var(--cyan-dim);
      border: 1px solid rgba(74,240,196,0.2);
      color: var(--cyan);
      border-radius: 4px;
      padding: 3px 8px;
      letter-spacing: 0.04em;
    }

    /* ── Messages area ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 2px; }

    /* ── Empty state ── */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 40px;
      text-align: center;
      pointer-events: none;
    }

    .empty-icon {
      font-size: 32px;
      opacity: 0.3;
    }

    .empty-title {
      font-family: var(--mono);
      font-size: 14px;
      color: var(--text-mid);
      letter-spacing: 0.04em;
    }

    .empty-sub {
      font-size: 13px;
      color: var(--text-dim);
      max-width: 320px;
      line-height: 1.6;
    }

    /* ── Message rows ── */
    .msg-row {
      display: flex;
      padding: 4px 24px;
      animation: fadeSlide 0.2s ease forwards;
    }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-row.user  { justify-content: flex-end; }
    .msg-row.assistant { justify-content: flex-start; }

    .msg-bubble {
      max-width: 72%;
      padding: 11px 15px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.65;
      word-break: break-word;
    }

    .msg-row.user .msg-bubble {
      background: var(--bg-user);
      border: 1px solid #243045;
      color: var(--text);
      font-family: var(--sans);
    }

    .msg-row.assistant .msg-bubble {
      background: var(--bg-msg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--sans);
    }

    /* ── Streaming cursor ── */
    .cursor {
      display: inline-block;
      width: 2px;
      height: 14px;
      background: var(--cyan);
      margin-left: 2px;
      vertical-align: middle;
      box-shadow: 0 0 6px var(--cyan-glow);
      animation: blink 0.8s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* ── Role label ── */
    .msg-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.06em;
      margin-bottom: 3px;
      text-transform: uppercase;
    }

    .msg-row.user      .msg-label { color: #4a7fcb; text-align: right; }
    .msg-row.assistant .msg-label { color: var(--cyan); }

    .msg-wrap {
      display: flex;
      flex-direction: column;
      max-width: 72%;
    }

    .msg-row.user .msg-wrap { align-items: flex-end; }

    /* ── Input area ── */
    .input-area {
      border-top: 1px solid var(--border);
      background: var(--bg-panel);
      padding: 16px 20px;
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      max-width: 760px;
      margin: 0 auto;
    }

    .input-box {
      flex: 1;
      background: var(--bg-msg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 11px 14px;
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.5;
      resize: none;
      outline: none;
      min-height: 44px;
      max-height: 140px;
      transition: border-color 0.15s;
      overflow-y: auto;
    }

    .input-box::placeholder { color: var(--text-dim); }

    .input-box:focus {
      border-color: var(--border-hi);
      box-shadow: 0 0 0 2px var(--cyan-dim);
    }

    .input-box:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-send {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      background: var(--cyan);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .btn-send:hover:not(:disabled) {
      background: #6af5d0;
      box-shadow: 0 0 14px var(--cyan-glow);
    }

    .btn-send:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .btn-send svg {
      width: 18px; height: 18px;
      fill: none;
      stroke: #0e0e0e;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* Loading spinner inside send button */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(0,0,0,0.2);
      border-top-color: #0e0e0e;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer hint ── */
    .input-hint {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
      text-align: center;
      margin-top: 8px;
      letter-spacing: 0.04em;
    }

    /* ── Token counter ── */
    .token-bar {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 6px;
    }

    .token-stat {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
    }

    .token-stat span {
      color: var(--cyan);
    }

    /* ── Error message ── */
    .msg-row.error .msg-bubble {
      background: rgba(255,95,87,0.08);
      border-color: rgba(255,95,87,0.25);
      color: #ff8a85;
      font-family: var(--mono);
      font-size: 13px;
    }
  </style>
</head>
<body>

<!-- Top bar -->
<header class="topbar">
  <div class="topbar-left">
    <div class="traffic-lights">
      <div class="tl tl-red"></div>
      <div class="tl tl-yellow"></div>
      <div class="tl tl-green"></div>
    </div>
    <div class="topbar-title">stream<span>chat</span>.py</div>
    <div class="model-badge">llama-3.3-70b-versatile</div>
  </div>
  <div class="topbar-right">
    <div class="status-dot"></div>
    <div class="status-label">groq · connected</div>
    <button class="btn-reset" onclick="resetChat()">↺ reset</button>
  </div>
</header>

<!-- Messages -->
<div id="messages">
  <div class="empty-state" id="empty-state">
    <div class="empty-icon">⚡</div>
    <div class="empty-title">SSE streaming active</div>
    <div class="empty-sub">Type a message to start. Tokens stream token-by-token via Server-Sent Events — FastAPI + Groq under the hood.</div>
  </div>
</div>

<!-- Input -->
<div class="input-area">
  <div class="input-row">
    <textarea
      id="input"
      class="input-box"
      placeholder="Send a message…"
      rows="1"
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"
    ></textarea>
    <button class="btn-send" id="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
  <div class="token-bar">
    <div class="token-stat">session tokens <span id="token-count">0</span></div>
    <div class="token-stat">messages <span id="msg-count">0</span></div>
  </div>
  <div class="input-hint">↵ send · shift+↵ newline · ↺ reset clears history</div>
</div>

<script>
  let isStreaming = false;
  let sessionTokens = 0;
  let messageCount = 0;

  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('input');
  const sendBtn    = document.getElementById('send-btn');
  const emptyState = document.getElementById('empty-state');

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 140) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function hideEmpty() {
    if (emptyState) emptyState.style.display = 'none';
  }

  function appendMessage(role, text = '') {
    hideEmpty();
    const row = document.createElement('div');
    row.className = `msg-row ${role}`;

    const wrap = document.createElement('div');
    wrap.className = 'msg-wrap';

    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = role === 'user' ? 'you' : 'llm';

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.textContent = text;

    wrap.appendChild(label);
    wrap.appendChild(bubble);
    row.appendChild(wrap);
    messagesEl.appendChild(row);
    scrollToBottom();
    return bubble;
  }

  function setLoading(loading) {
    isStreaming = loading;
    inputEl.disabled = loading;
    sendBtn.disabled = loading;
    sendBtn.innerHTML = loading
      ? '<div class="spinner"></div>'
      : '<svg viewBox="0 0 24 24" fill="none" stroke="#0e0e0e" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>';
  }

  function updateCounters(newTokens) {
    sessionTokens += newTokens;
    messageCount += 1;
    document.getElementById('token-count').textContent = sessionTokens;
    document.getElementById('msg-count').textContent = messageCount;
  }

  function sendMessage() {
    const prompt = inputEl.value.trim();
    if (!prompt || isStreaming) return;

    // Show user message
    appendMessage('user', prompt);
    inputEl.value = '';
    inputEl.style.height = 'auto';

    // Rough token estimate for input
    const inputTokens = Math.ceil(prompt.length / 4);

    setLoading(true);

    // Create assistant bubble with cursor
    const bubble = appendMessage('assistant');
    const cursor = document.createElement('span');
    cursor.className = 'cursor';
    bubble.appendChild(cursor);

    let fullText = '';

    // Connect to SSE stream
    const url = `/chat/stream?prompt=${encodeURIComponent(prompt)}`;
    const es = new EventSource(url);

    es.onmessage = (e) => {
      const token = e.data;
      fullText += token;
      // Update bubble text, keep cursor at end
      bubble.textContent = fullText;
      bubble.appendChild(cursor);
      scrollToBottom();
    };

    es.onerror = () => {
      es.close();
      cursor.remove();

      if (!fullText) {
        bubble.textContent = '⚠ Stream error — check your API key or server logs.';
        bubble.parentElement.parentElement.classList.add('error');
      }

      const outputTokens = Math.ceil(fullText.length / 4);
      updateCounters(inputTokens + outputTokens);
      setLoading(false);
      inputEl.focus();
    };

    // Some providers send a [DONE] signal — handle cleanly
    es.addEventListener('done', () => {
      es.close();
      cursor.remove();
      const outputTokens = Math.ceil(fullText.length / 4);
      updateCounters(inputTokens + outputTokens);
      setLoading(false);
      inputEl.focus();
    });
  }

  async function resetChat() {
    if (isStreaming) return;
    try {
      await fetch('/chat/reset', { method: 'DELETE' });
    } catch (e) {
      console.warn('Reset endpoint error:', e);
    }

    // Clear UI
    messagesEl.innerHTML = '';
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.id = 'empty-state';
    empty.innerHTML = `
      <div class="empty-icon">⚡</div>
      <div class="empty-title">history cleared</div>
      <div class="empty-sub">Session reset. Start a fresh conversation.</div>
    `;
    messagesEl.appendChild(empty);

    sessionTokens = 0;
    messageCount  = 0;
    document.getElementById('token-count').textContent = '0';
    document.getElementById('msg-count').textContent  = '0';
    inputEl.focus();
  }

  // Focus input on load
  inputEl.focus();
</script>
</body>
</html>
