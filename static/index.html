<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StreamChat</title>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600&family=Sora:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Markdown renderer -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <!-- Code syntax highlighting -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Tokens / Variables ── */
    :root {
      --bg:           #ffffff;
      --bg-sidebar:   #f7f6f3;
      --bg-hover:     #f1f0ed;
      --border:       #e8e7e4;
      --border-mid:   #d3d1cb;
      --text:         #1a1a1a;
      --text-mid:     #787774;
      --text-dim:     #9b9a97;
      --accent:       #2383e2;
      --accent-light: #e8f3fd;
      --green:        #0f7b6c;
      --green-light:  #e6f4f1;
      --code-bg:      #f7f6f3;
      --code-border:  #e8e7e4;
      --user-bg:      #f0f7ff;
      --user-border:  #cce0f7;
      --mono:         'JetBrains Mono', monospace;
      --sans:         'Sora', sans-serif;
      --serif:        'Crimson Pro', serif;
    }

    body {
      font-family: var(--sans);
      font-size: 15px;
      line-height: 1.7;
      color: var(--text);
      background: var(--bg);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Top bar — Notion-style ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 45px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-sidebar);
      flex-shrink: 0;
      user-select: none;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .page-icon { font-size: 18px; }

    .page-title {
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    .model-tag {
      font-family: var(--mono);
      font-size: 11px;
      background: var(--accent-light);
      color: var(--accent);
      border: 1px solid #c8dff6;
      border-radius: 4px;
      padding: 2px 8px;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.35; }
    }

    .btn-reset {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-mid);
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 4px 10px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-reset:hover {
      border-color: #e03e3e;
      color: #e03e3e;
      background: #fdecea;
    }

    /* ── Messages area ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 32px 0 16px;
      display: flex;
      flex-direction: column;
      gap: 0;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Empty state ── */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 60px 40px;
      text-align: center;
      pointer-events: none;
    }

    .empty-icon { font-size: 36px; opacity: 0.25; }

    .empty-title {
      font-family: var(--serif);
      font-size: 22px;
      color: var(--text-mid);
    }

    .empty-sub {
      font-size: 13px;
      color: var(--text-dim);
      max-width: 300px;
      line-height: 1.6;
    }

    /* ── Message rows ── */
    .msg-row {
      display: flex;
      flex-direction: column;
      padding: 6px 48px;
      animation: fadeUp 0.18s ease forwards;
      max-width: 860px;
      margin: 0 auto;
      width: 100%;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-label {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }

    .msg-row.user  .msg-label { color: var(--accent); }
    .msg-row.assistant .msg-label { color: var(--green); }

    .msg-bubble {
      padding: 12px 16px;
      border-radius: 6px;
      font-size: 14.5px;
      line-height: 1.7;
      word-break: break-word;
    }

    /* During streaming: plain text with correct whitespace */
    .msg-bubble.streaming {
      white-space: pre-wrap;
      font-family: var(--sans);
    }

    .msg-row.user .msg-bubble {
      background: var(--user-bg);
      border: 1px solid var(--user-border);
      color: var(--text);
      white-space: pre-wrap;
    }

    .msg-row.assistant .msg-bubble {
      background: transparent;
      border: none;
      color: var(--text);
      padding-left: 0;
      padding-right: 0;
    }

    /* ── Markdown rendered content ── */
    .msg-bubble p { margin-bottom: 10px; }
    .msg-bubble p:last-child { margin-bottom: 0; }

    .msg-bubble ul, .msg-bubble ol {
      margin: 8px 0 8px 20px;
    }

    .msg-bubble li { margin-bottom: 4px; }

    .msg-bubble h1, .msg-bubble h2, .msg-bubble h3 {
      font-family: var(--serif);
      font-weight: 600;
      margin: 16px 0 8px;
      color: var(--text);
    }

    .msg-bubble h1 { font-size: 22px; }
    .msg-bubble h2 { font-size: 18px; }
    .msg-bubble h3 { font-size: 16px; }

    /* Inline code */
    .msg-bubble code {
      font-family: var(--mono);
      font-size: 12.5px;
      background: var(--code-bg);
      border: 1px solid var(--code-border);
      border-radius: 3px;
      padding: 1px 5px;
      color: #e03e3e;
    }

    /* Code blocks */
    .msg-bubble pre {
      background: var(--bg-sidebar);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 14px 16px;
      overflow-x: auto;
      margin: 10px 0;
    }

    .msg-bubble pre code {
      background: none;
      border: none;
      padding: 0;
      color: var(--text);
      font-size: 13px;
      line-height: 1.6;
    }

    /* Code block header showing language */
    .code-wrapper {
      position: relative;
      margin: 10px 0;
    }

    .code-lang {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
      background: var(--bg-sidebar);
      border: 1px solid var(--border);
      border-bottom: none;
      border-radius: 6px 6px 0 0;
      padding: 4px 12px;
      display: inline-block;
    }

    .code-wrapper pre {
      margin: 0;
      border-radius: 0 6px 6px 6px;
    }

    /* Blockquote */
    .msg-bubble blockquote {
      border-left: 3px solid var(--border-mid);
      padding-left: 14px;
      color: var(--text-mid);
      margin: 8px 0;
    }

    /* Horizontal rule */
    .msg-bubble hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 14px 0;
    }

    /* ── Streaming cursor ── */
    .cursor {
      display: inline-block;
      width: 2px;
      height: 14px;
      background: var(--text-mid);
      margin-left: 2px;
      vertical-align: middle;
      animation: blink 0.9s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* ── Divider between turns ── */
    .turn-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 10px 48px;
      max-width: 764px;
      width: calc(100% - 96px);
      align-self: center;
    }

    /* ── Input area ── */
    .input-area {
      border-top: 1px solid var(--border);
      background: var(--bg);
      padding: 14px 48px 12px;
      flex-shrink: 0;
    }

    .input-inner {
      max-width: 764px;
      margin: 0 auto;
    }

    .input-box-wrap {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      background: var(--bg);
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .input-box-wrap:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-light);
    }

    textarea#input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.6;
      resize: none;
      min-height: 24px;
      max-height: 160px;
      overflow-y: auto;
    }

    textarea#input::placeholder { color: var(--text-dim); }
    textarea#input:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-send {
      width: 32px; height: 32px;
      border-radius: 6px;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
    }

    .btn-send:hover:not(:disabled) { background: #1a6ec4; }
    .btn-send:disabled { opacity: 0.35; cursor: not-allowed; }

    .btn-send svg {
      width: 15px; height: 15px;
      fill: none;
      stroke: white;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .spinner {
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .input-hint {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
      margin-top: 7px;
      display: flex;
      justify-content: space-between;
    }

    .token-info { color: var(--text-dim); }
    .token-info span { color: var(--accent); }
  </style>
</head>
<body>

<!-- Top bar -->
<header class="topbar">
  <div class="topbar-left">
    <div class="page-icon">💬</div>
    <div class="page-title">Streaming Chat API</div>
    <div class="model-tag">llama-3.3-70b-versatile</div>
  </div>
  <div class="topbar-right">
    <div class="status-pill">
      <div class="status-dot"></div>
      groq · live
    </div>
    <button class="btn-reset" onclick="resetChat()">↺ reset</button>
  </div>
</header>

<!-- Messages -->
<div id="messages">
  <div class="empty-state" id="empty-state">
    <div class="empty-icon">💬</div>
    <div class="empty-title">Start a conversation</div>
    <div class="empty-sub">Tokens stream live via SSE — FastAPI + Groq under the hood.</div>
  </div>
</div>

<!-- Input -->
<div class="input-area">
  <div class="input-inner">
    <div class="input-box-wrap">
      <textarea
        id="input"
        placeholder="Ask anything…"
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button class="btn-send" id="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
    <div class="input-hint">
      <span>↵ send &nbsp;·&nbsp; shift+↵ newline</span>
      <span class="token-info">tokens <span id="token-count">0</span> &nbsp;·&nbsp; turns <span id="msg-count">0</span></span>
    </div>
  </div>
</div>

<script>
  // ── Configure marked ──────────────────────────────────────────
  marked.setOptions({
    breaks: true,       // \n becomes <br> inside paragraphs
    gfm: true,          // GitHub-flavoured markdown
    highlight: (code, lang) => {
      if (lang && hljs.getLanguage(lang)) {
        return hljs.highlight(code, { language: lang }).value;
      }
      return hljs.highlightAuto(code).value;
    }
  });

  // Override code block renderer to add language label
  const renderer = new marked.Renderer();
  renderer.code = (code, lang) => {
    const highlighted = (lang && hljs.getLanguage(lang))
      ? hljs.highlight(code, { language: lang }).value
      : hljs.highlightAuto(code).value;
    const langLabel = lang
      ? `<div class="code-lang">${lang}</div>`
      : '';
    return `<div class="code-wrapper">${langLabel}<pre><code class="hljs">${highlighted}</code></pre></div>`;
  };
  marked.use({ renderer });

  // ── State ─────────────────────────────────────────────────────
  let isStreaming   = false;
  let sessionTokens = 0;
  let turnCount     = 0;

  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('input');
  const sendBtn    = document.getElementById('send-btn');

  // ── Helpers ───────────────────────────────────────────────────
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 160) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function hideEmpty() {
    const el = document.getElementById('empty-state');
    if (el) el.remove();
  }

  function setLoading(on) {
    isStreaming        = on;
    inputEl.disabled   = on;
    sendBtn.disabled   = on;
    sendBtn.innerHTML  = on
      ? '<div class="spinner"></div>'
      : '<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>';
  }

  function addDivider() {
    const hr = document.createElement('hr');
    hr.className = 'turn-divider';
    messagesEl.appendChild(hr);
  }

  // Build a message row; returns the bubble element
  function appendMessage(role, text = '') {
    hideEmpty();
    const row    = document.createElement('div');
    row.className = `msg-row ${role}`;

    const label  = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = role === 'user' ? 'You' : 'Assistant';

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';

    if (role === 'user') {
      // User messages: plain text, pre-wrap handles newlines
      bubble.textContent = text;
    } else {
      // Assistant during streaming: pre-wrap raw text
      bubble.classList.add('streaming');
      bubble.textContent = text;
    }

    row.appendChild(label);
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    scrollToBottom();
    return bubble;
  }

  // Once streaming finishes, render the accumulated text as markdown
  function renderMarkdown(bubble, fullText) {
    bubble.classList.remove('streaming');
    bubble.innerHTML = marked.parse(fullText);
    scrollToBottom();
  }

  function updateCounters(tokens) {
    sessionTokens += tokens;
    turnCount     += 1;
    document.getElementById('token-count').textContent = sessionTokens;
    document.getElementById('msg-count').textContent   = turnCount;
  }

  // ── Send ──────────────────────────────────────────────────────
  function sendMessage() {
    const prompt = inputEl.value.trim();
    if (!prompt || isStreaming) return;

    addDivider();
    appendMessage('user', prompt);
    inputEl.value      = '';
    inputEl.style.height = 'auto';

    const inputTokens = Math.ceil(prompt.length / 4);
    setLoading(true);

    // Assistant bubble — starts in streaming (pre-wrap) mode
    const bubble = appendMessage('assistant');
    const cursor = document.createElement('span');
    cursor.className = 'cursor';
    bubble.appendChild(cursor);

    let fullText = '';

    // BUG 2 FIX: EventSource sends tokens that may include \n characters.
    // While streaming we use textContent + white-space:pre-wrap so they
    // render correctly as line breaks instead of collapsing or going vertical.
    const es = new EventSource(`/chat/stream?prompt=${encodeURIComponent(prompt)}`);

    es.onmessage = (e) => {
      fullText += e.data;
      // Update raw text — cursor stays at end
      bubble.textContent = fullText;
      bubble.appendChild(cursor);
      scrollToBottom();
    };

    const onDone = () => {
      es.close();
      cursor.remove();
      // BUG 1 FIX: render full accumulated text as markdown now that
      // streaming is complete — code blocks, inline code, lists etc.
      renderMarkdown(bubble, fullText);
      const outputTokens = Math.ceil(fullText.length / 4);
      updateCounters(inputTokens + outputTokens);
      setLoading(false);
      inputEl.focus();
    };

    es.onerror = onDone;               // stream closed = done for Groq
    es.addEventListener('done', onDone); // explicit done event if sent
  }

  // ── Reset ─────────────────────────────────────────────────────
  async function resetChat() {
    if (isStreaming) return;
    try { await fetch('/chat/reset', { method: 'DELETE' }); } catch (_) {}

    messagesEl.innerHTML = `
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">💬</div>
        <div class="empty-title">History cleared</div>
        <div class="empty-sub">Start a fresh conversation.</div>
      </div>`;

    sessionTokens = 0; turnCount = 0;
    document.getElementById('token-count').textContent = '0';
    document.getElementById('msg-count').textContent   = '0';
    inputEl.focus();
  }

  inputEl.focus();
</script>
</body>
</html>
